<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eagle Required MB Summary &mdash; ScoutSight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ebe0; --surface: #faf7f2; --surface-2: #f5f0e6;
      --border: #d6ccb8; --border-lt: #e8e1d4;
      --text: #28200f; --text-muted: #7a6e58;
      --green: #1a4d2e; --green-mid: #256937; --green-lt: #3a8a50;
      --amber: #c47a0e; --amber-lt: #fde8b8;
      --red: #b03030; --red-lt: #fddcdc;
      --yellow-lt: #fef6c0; --yellow: #b89010;
      --nav-green: #52b056; --nav-green-hv: #80d480; --stripe: #3a5bb8;
      --font-h: 'Oswald', sans-serif; --font-b: 'Nunito', sans-serif;
      --r: 6px; --r-lg: 10px;
      --sh-sm: 0 1px 3px rgba(0,0,0,.10); --sh-md: 0 3px 12px rgba(0,0,0,.14);
      --t: .15s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: var(--font-b); background: var(--bg); color: var(--text); min-height: 100vh; }
    button { font-family: inherit; }
    a { color: var(--green-mid); text-decoration: none; }
    a:hover { color: var(--green); text-decoration: underline; }

    .site-header { background: #000; border-bottom: 3px solid var(--stripe); display: flex; align-items: center; justify-content: space-between; padding: .5rem 1.5rem; position: sticky; top: 0; z-index: 300; }
    .site-logo-img { height: 2.8rem; display: block; }
    .site-nav { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
    .site-nav a { color: var(--nav-green); text-decoration: none; font-family: var(--font-b); font-size: .9rem; font-weight: 700; letter-spacing: .02em; }
    .site-nav a:hover { color: var(--nav-green-hv); text-decoration: underline; }

    #root { display: contents; }
    .pw { max-width: 1060px; margin: 0 auto; padding: 0 1rem 3rem; }

    .ph { padding: 1.6rem 0 1.1rem; margin-bottom: 1.3rem; border-bottom: 2px solid var(--border); display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
    .ph-title { font-family: var(--font-h); font-size: 2rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--green); line-height: 1; }
    .ph-sub { color: var(--text-muted); font-size: .9rem; font-weight: 500; }

    .fp { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--sh-sm); margin-bottom: 1.4rem; overflow: hidden; }
    .fp-head { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.1rem; cursor: pointer; user-select: none; border-bottom: 1px solid transparent; transition: border-color var(--t); }
    .fp-head.open { border-bottom-color: var(--border-lt); }
    .fp-label { font-family: var(--font-h); font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
    .fp-label-active { color: var(--green-mid); font-weight: 700; }
    .fp-chevron { width: 20px; height: 20px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
    .fp-chevron.open { transform: rotate(180deg); }
    .fp-body { padding: .85rem 1.1rem 1rem; display: flex; flex-direction: column; gap: .65rem; }
    .fp-body.hidden { display: none; }
    .frow { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
    .flabel { font-family: var(--font-h); font-size: .72rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); min-width: 5.8rem; flex-shrink: 0; }
    .chips { display: flex; gap: .3rem; flex-wrap: wrap; }
    .chip { padding: .2rem .75rem; border-radius: 999px; border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text); cursor: pointer; font-family: var(--font-b); font-size: .82rem; font-weight: 600; line-height: 1.4; transition: all var(--t); white-space: nowrap; }
    .chip:hover:not(.chip-on) { background: #e6e0d4; border-color: #c4baa8; }
    .chip-on { background: var(--green); border-color: var(--green); color: #fff; }
    .fsel { padding: .28rem .6rem; border: 1.5px solid var(--border); border-radius: var(--r); background: var(--surface); font-family: var(--font-b); font-size: .85rem; color: var(--text); cursor: pointer; }
    .reset-btn { margin-left: auto; padding: .2rem .8rem; background: none; border: 1.5px solid var(--border); border-radius: var(--r); font-family: var(--font-b); font-size: .8rem; color: var(--text-muted); cursor: pointer; transition: all var(--t); white-space: nowrap; }
    .reset-btn:hover { background: var(--surface-2); color: var(--text); border-color: #b0a890; }

    .sbar { display: flex; gap: 1.4rem; align-items: center; flex-wrap: wrap; padding: .55rem 0; margin-bottom: 1rem; border-bottom: 1px dashed var(--border); font-size: .85rem; color: var(--text-muted); }
    .sstat strong { font-family: var(--font-h); font-size: 1.1rem; color: var(--text); margin-right: .2rem; }
    .sbar-filter-active { font-size: .78rem; font-weight: 700; color: var(--amber); letter-spacing: .03em; }

    /* Slot cards */
    .slot-list { display: flex; flex-direction: column; gap: .55rem; }
    .slot-card { background: var(--surface); border: 1px solid var(--border-lt); border-left: 4px solid var(--border); border-radius: var(--r); box-shadow: var(--sh-sm); transition: box-shadow var(--t); overflow: hidden; }
    .slot-card:hover { box-shadow: var(--sh-md); }
    .slot-card-low  { border-left-color: var(--yellow); }
    .slot-card-mid  { border-left-color: var(--amber); }
    .slot-card-high { border-left-color: var(--red); }
    .slot-card-ok   { border-left-color: var(--green-lt); }
    .slot-main { display: grid; grid-template-columns: 2.4rem 1fr auto; align-items: center; gap: .7rem; padding: .7rem 1rem; }
    .slot-num { font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; color: var(--green); text-align: center; }
    .slot-body { display: flex; flex-direction: column; gap: .25rem; }
    .slot-name { font-weight: 700; font-size: .92rem; color: var(--text); display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .slot-name a { color: var(--green-mid); font-weight: 700; }
    .slot-name a:hover { color: var(--green); }
    .camp-badge { font-size: .67rem; font-weight: 700; font-family: var(--font-h); letter-spacing: .05em; text-transform: uppercase; padding: .08rem .45rem; border-radius: 3px; white-space: nowrap; }
    .camp-badge-yes { background: #d0efef; color: #1a6060; }
    .camp-badge-no  { background: var(--amber-lt); color: #6b3800; }
    .slot-meta { font-size: .78rem; color: var(--text-muted); }
    .slot-right { display: flex; align-items: center; gap: .5rem; }
    .partial-count { font-size: .78rem; color: var(--text-muted); text-align: center; line-height: 1.2; }
    .partial-n { font-family: var(--font-h); font-size: .9rem; font-weight: 600; color: var(--text-muted); display: block; }
    .rcnt { display: inline-flex; align-items: center; justify-content: center; width: 2.3rem; height: 2.3rem; border-radius: 50%; font-family: var(--font-h); font-size: 1rem; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: transform var(--t), box-shadow var(--t); }
    .rcnt:hover { transform: scale(1.12); box-shadow: var(--sh-md); }
    .rcnt-low  { background: var(--yellow-lt); color: #5a4000; border-color: var(--yellow); }
    .rcnt-mid  { background: var(--amber-lt);  color: #6b3800; border-color: var(--amber); }
    .rcnt-high { background: var(--red-lt);    color: #6b0000; border-color: var(--red); }
    .rcnt-ok   { background: #d4f0d4; color: var(--green); border-color: var(--green-lt); cursor: default; }
    .rcnt-open { box-shadow: 0 0 0 3px rgba(26,77,46,.25); }

    /* Rank expand */
    .rank-expand { border-top: 1px solid var(--border-lt); padding: .65rem 1rem; background: var(--surface-2); animation: fadeIn .14s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
    .rank-grid { display: flex; flex-wrap: wrap; gap: .4rem .7rem; }
    .rank-item { display: flex; align-items: center; gap: .35rem; background: var(--surface); border: 1px solid var(--border-lt); border-radius: var(--r); padding: .3rem .6rem; }
    .rank-item-label { font-family: var(--font-h); font-size: .72rem; letter-spacing: .04em; text-transform: uppercase; color: var(--text-muted); }
    .rank-item-need { font-family: var(--font-h); font-weight: 700; font-size: .9rem; color: var(--red); }
    .rank-item-partial { font-family: var(--font-h); font-weight: 600; font-size: .82rem; color: var(--amber); }
    .rank-item-ok { font-size: .9rem; color: var(--green-mid); }
    .expand-hdr { font-family: var(--font-h); font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .45rem; }
    .slist-names { margin-top: .45rem; display: flex; flex-direction: column; gap: .15rem; }
    .srow { display: flex; align-items: center; gap: .4rem; padding: .15rem 0; border-bottom: 1px solid var(--border-lt); font-size: .83rem; }
    .srow:last-child { border-bottom: none; }
    .stag { font-size: .64rem; font-weight: 700; font-family: var(--font-h); background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); padding: .04rem .38rem; border-radius: 3px; white-space: nowrap; }

    .empty { text-align: center; color: var(--text-muted); padding: 2.5rem 1rem; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--r-lg); }
    .empty strong { display: block; font-family: var(--font-h); font-size: 1.1rem; color: var(--green); margin-bottom: .3rem; text-transform: uppercase; }

    @media (max-width: 580px) {
      .ph-title { font-size: 1.55rem; }
      .pw { padding: 0 .75rem 2rem; }
      .slot-main { grid-template-columns: 2rem 1fr auto; gap: .5rem; padding: .6rem .75rem; }
      .flabel { min-width: 4.5rem; font-size: .68rem; }
      .chip { font-size: .78rem; padding: .17rem .6rem; }
    }
  </style>
</head>
<body>
  [(${siteHeader})]
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    const SUMMARY_DATA = [(${summaryJson})];
  </script>
  <script type="text/babel">
    const RANK_LABELS = ['Scout','Tenderfoot','2nd Class','1st Class','Star','Life'];

    function urgency(n) {
      if (n >= 8) return 'high';
      if (n >= 4) return 'mid';
      return 'low';
    }

    function matchesFilters(scout, filters) {
      if (filters.patrol    !== 'All' && scout.patrol    !== filters.patrol)        return false;
      if (filters.grade     !== 'All' && scout.grade     !== Number(filters.grade)) return false;
      if (filters.birthYear !== 'All' && scout.birthYear !== filters.birthYear)     return false;
      if (filters.joinYear  !== 'All' && scout.joinYear  !== filters.joinYear)      return false;
      if (filters.ranks.size > 0      && !filters.ranks.has(scout.rank))             return false;
      return true;
    }

    function filterList(scouts, filters) {
      const noOp = filters.patrol === 'All' && filters.grade === 'All'
        && filters.birthYear === 'All' && filters.joinYear === 'All' && filters.ranks.size === 0;
      return noOp ? scouts : scouts.filter(s => matchesFilters(s, filters));
    }

    function Chip({ label, active, onClick }) {
      return (
        <button type="button" className={'chip' + (active ? ' chip-on' : '')} onClick={onClick}>
          {label}
        </button>
      );
    }

    function SlotCard({ slot, filters }) {
      const [open, setOpen] = React.useState(false);
      const nc      = filterList(slot.notCompleteScouts, filters);
      const partial = filterList(slot.partialScouts, filters);
      const n       = nc.length;
      const urg     = n > 0 ? urgency(n) : 'ok';

      const badgeDisplayName = name => name.endsWith(' MB') ? name.slice(0, -3) : name;

      return (
        <div className={`slot-card slot-card-${urg}`}>
          <div className="slot-main">
            <div className="slot-num">{slot.slotNum}</div>
            <div className="slot-body">
              <div className="slot-name">
                {slot.links && slot.links.length > 0
                  ? slot.links.map((lnk, i) => (
                      <React.Fragment key={lnk.badge}>
                        {i > 0 && <span style={{color:'var(--border)'}}>&#183;</span>}
                        <a href={lnk.file}>{badgeDisplayName(lnk.badge)}</a>
                      </React.Fragment>
                    ))
                  : <span>{slot.slotLabel}</span>
                }
                <span className={`camp-badge ${slot.atCamp ? 'camp-badge-yes' : 'camp-badge-no'}`}>
                  {slot.atCamp ? '\u2713 At Camp' : '\u2717 Not At Camp'}
                </span>
              </div>
              {partial.length > 0 && (
                <div className="slot-meta">{partial.length} partially complete</div>
              )}
            </div>
            <div className="slot-right">
              {n > 0 ? (
                <button type="button"
                  className={`rcnt rcnt-${urg}${open ? ' rcnt-open' : ''}`}
                  onClick={() => setOpen(o => !o)}
                  title={open ? 'Collapse' : `${n} scout${n !== 1 ? 's' : ''} need this`}>
                  {n}
                </button>
              ) : (
                <div className="rcnt rcnt-ok" title="All scouts have completed this slot">&#10003;</div>
              )}
            </div>
          </div>

          {open && (
            <div className="rank-expand">
              <div className="expand-hdr">By rank &mdash; scouts needing this slot</div>
              <div className="rank-grid">
                {slot.byRank.map(r => {
                  const rnc = filterList(r.notCompleteScouts, filters);
                  const rp  = filterList(r.partialScouts, filters);
                  if (rnc.length === 0 && rp.length === 0) return null;
                  return (
                    <div key={r.rank} className="rank-item">
                      <span className="rank-item-label">{r.rank}</span>
                      {rnc.length > 0 && <span className="rank-item-need">{rnc.length} need</span>}
                      {rp.length  > 0 && <span className="rank-item-partial">{rp.length} partial</span>}
                    </div>
                  );
                })}
              </div>
              {nc.length > 0 && (
                <div className="slist-names">
                  <div className="expand-hdr" style={{marginTop:'.6rem'}}>Scouts needing &middot; {nc.length}</div>
                  {nc.map(s => (
                    <div key={s.memberId} className="srow">
                      <a href={`scout_${s.memberId}.html`}>{s.name}</a>
                      {s.rank   && <span className="stag">{s.rank}</span>}
                      {s.patrol && <span style={{fontSize:'.75rem',color:'var(--text-muted)'}}>&#183; {s.patrol}</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const d = SUMMARY_DATA;
      const [patrol,    setPatrol]    = React.useState('All');
      const [grade,     setGrade]     = React.useState('All');
      const [birthYear, setBirthYear] = React.useState('All');
      const [joinYear,  setJoinYear]  = React.useState('All');
      const [ranks,     setRanks]     = React.useState(new Set());
      function toggleRank(r) {
        setRanks(prev => { const n = new Set(prev); n.has(r) ? n.delete(r) : n.add(r); return n; });
      }
      const [fpOpen,    setFpOpen]    = React.useState(true);

      const filters    = { patrol, grade, birthYear, joinYear, ranks };
      const hasActive  = patrol !== 'All' || grade !== 'All' || birthYear !== 'All'
        || joinYear !== 'All' || ranks.size > 0;

      function resetAll() {
        setPatrol('All'); setGrade('All'); setBirthYear('All'); setJoinYear('All'); setRanks(new Set());
      }

      const slotsNeedingCount = d.slots.filter(s => filterList(s.notCompleteScouts, filters).length > 0).length;

      return (
        <div className="pw">
          <div className="ph">
            <div className="ph-title">Eagle MB Summary</div>
            <div className="ph-sub">Eagle-required merit badge slots &middot; {d.slots.length} total</div>
          </div>

          <div className="fp">
            <div className={`fp-head${fpOpen ? ' open' : ''}`}
                 onClick={() => setFpOpen(o => !o)} role="button" aria-expanded={fpOpen}>
              <span className={`fp-label${hasActive ? ' fp-label-active' : ''}`}>
                {hasActive ? '\u25CF Filters active' : 'Filters'}
              </span>
              <svg className={`fp-chevron${fpOpen ? ' open' : ''}`} viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 011.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clipRule="evenodd"/>
              </svg>
            </div>
            <div className={`fp-body${fpOpen ? '' : ' hidden'}`}>
              {d.hasRosterData && d.patrols?.length > 0 && (
                <div className="frow">
                  <span className="flabel">Patrol</span>
                  <div className="chips">
                    <Chip label="All" active={patrol === 'All'} onClick={() => setPatrol('All')} />
                    {d.patrols.map(p => <Chip key={p} label={p} active={patrol === p} onClick={() => setPatrol(p)} />)}
                  </div>
                </div>
              )}
              {d.rankOptions?.length > 0 && (
                <div className="frow">
                  <span className="flabel">Scout Rank</span>
                  <div className="chips">
                    <Chip label="All" active={ranks.size === 0} onClick={() => setRanks(new Set())} />
                    {d.rankOptions.map(r => <Chip key={r} label={r} active={ranks.has(r)} onClick={() => toggleRank(r)} />)}
                  </div>
                </div>
              )}
              <div className="frow">
                {d.gradeOptions?.length > 0 && (
                  <>
                    <span className="flabel">Grade</span>
                    <select className="fsel" value={grade} onChange={e => setGrade(e.target.value)}>
                      <option value="All">All grades</option>
                      {d.gradeOptions.map(g => <option key={g} value={g}>Grade {g}</option>)}
                    </select>
                  </>
                )}
                {d.hasRosterData && d.birthYears?.length > 0 && (
                  <>
                    <span className="flabel" style={{marginLeft:'.6rem'}}>Born</span>
                    <select className="fsel" value={birthYear} onChange={e => setBirthYear(e.target.value)}>
                      <option value="All">All years</option>
                      {d.birthYears.map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </>
                )}
                {d.hasRosterData && d.joinYears?.length > 0 && (
                  <>
                    <span className="flabel" style={{marginLeft:'.6rem'}}>Joined</span>
                    <select className="fsel" value={joinYear} onChange={e => setJoinYear(e.target.value)}>
                      <option value="All">All years</option>
                      {d.joinYears.map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </>
                )}
                {hasActive && (
                  <button className="reset-btn" type="button" onClick={resetAll}>&#10005; Reset all</button>
                )}
              </div>
            </div>
          </div>

          <div className="sbar">
            <div className="sstat"><strong>{slotsNeedingCount}</strong> slot{slotsNeedingCount !== 1 ? 's' : ''} with outstanding scouts</div>
            <div className="sstat"><strong>{d.totalScouts}</strong> total scouts</div>
            {hasActive && <span className="sbar-filter-active">&#9650; Filters active</span>}
          </div>

          <div className="slot-list">
            {d.slots.map(slot => (
              <SlotCard key={slot.slotNum} slot={slot} filters={filters} />
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
