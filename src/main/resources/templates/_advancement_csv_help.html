<div class="help-section">
    <div class="help-section-title">Advancement CSV</div>
    <div class="steps">
        <div class="step">
            <div class="step-num">1</div>
            <div class="step-text">Go to <a href="https://advancements.scouting.org/">advancements.scouting.org</a></div>
        </div>
        <div class="step">
            <div class="step-num">2</div>
            <div class="step-text">Click <strong>Reports</strong> in the left navigation</div>
        </div>
        <div class="step">
            <div class="step-num">3</div>
            <div class="step-text">Scroll down to <strong>Quick Exports</strong></div>
        </div>
        <div class="step">
            <div class="step-num">4</div>
            <div class="step-text">Find the <strong>Advancements</strong> row and click <strong>Export</strong></div>
        </div>
        <div class="step">
            <div class="step-num">5</div>
            <div class="step-text">Save the downloaded <code>.csv</code> file and pass it as the first argument to ScoutSight</div>
        </div>
    </div>
</div>
